<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ポニョロンポッペの儀式 - PS1 High-Res RPG Edition</title>
<style>
    body {
        margin: 0;
        background: #000;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
        font-family: 'Hiragino Mincho ProN', 'MS PMincho', serif;
    }

    /* スマホの画面にピタッと合わせるためのレスポンシブ設定 */
    #game-container {
        position: relative;
        width: 100vw;
        max-width: 640px;
        aspect-ratio: 4/3;
        border: 4px solid #fff;
        box-shadow: 0 0 0 4px #000, 0 0 0 8px #555, 0 0 30px rgba(255,255,255,0.2);
        background: #000;
        box-sizing: border-box;
    }

    canvas {
        display: block;
        width: 100%;
        height: 100%;
        transition: filter 3s ease;
    }

    #msg-window {
        display: none;
        position: absolute;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        width: 90%; /* スマホでも見やすいようにパーセント指定 */
        max-width: 560px;
        height: 140px;
        background: linear-gradient(to bottom, rgba(0, 0, 40, 0.9), rgba(0, 0, 10, 0.95));
        border: 4px double #d4af37;
        border-radius: 8px;
        color: #fff;
        padding: 20px;
        box-sizing: border-box;
        font-size: 24px;
        line-height: 1.5;
        z-index: 200;
        text-shadow: 2px 2px 2px #000;
        cursor: pointer; /* クリックできることを暗に提示 */
    }

    /* テキスト表示エリア */
    #msg-text {
        display: block;
        width: 100%;
        height: 100%;
    }

    /* 送り待ちの点滅カーソル */
    #msg-cursor {
        display: none;
        position: absolute;
        bottom: 15px;
        right: 25px;
        font-size: 20px;
        color: #d4af37;
        animation: blink 1s infinite;
    }

    @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
    }

    #staff-roll {
        display: none;
        position: absolute;
        inset: 0;
        background: rgba(40, 20, 10, 0.3);
        color: #fff;
        z-index: 300;
        text-align: center;
        overflow: hidden;
        text-shadow: 2px 2px 4px #000;
    }

    #roll-content {
        position: absolute;
        width: 100%;
        top: 100%;
        font-size: 24px;
    }

    .animate-roll {
        animation: scrollUp 15s linear forwards;
    }

    @keyframes scrollUp {
        to { top: -120%; }
    }

    #start-screen {
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,0.9);
        color: #fff;
        display: flex;
        justify-content: center;
        align-items: center;
        cursor: pointer;
        z-index: 500;
        font-size: 24px;
        letter-spacing: 2px;
    }

    .sepia-mode {
        filter: sepia(0.8) contrast(1.2) brightness(0.5);
    }

    /* スマホ向けのフォントサイズ微調整 */
    @media (max-width: 480px) {
        #msg-window { font-size: 18px; height: 120px; }
        #msg-cursor { font-size: 16px; bottom: 10px; right: 15px; }
    }
</style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas" width="640" height="480"></canvas>
    
    <div id="msg-window">
        <span id="msg-text"></span>
        <span id="msg-cursor">▼</span>
    </div>
    
    <div id="staff-roll">
        <div id="roll-content">
            <p style="margin-bottom: 80px; color: #d4af37;">- CAST & STAFF -</p>
            <p>Original Idea<br><strong>やわT</strong></p>
            <br><br>
            <p>Executive Director<br><strong>トトローズ</strong></p>
            <br><br><br><br>
            <p style="letter-spacing: 12px; font-size: 32px; color: #d4af37;">FIN</p>
        </div>
    </div>

    <div id="start-screen">画面をタップしてスタート</div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const msgWindow = document.getElementById('msg-window');
    const msgText = document.getElementById('msg-text');
    const msgCursor = document.getElementById('msg-cursor');
    const staffRoll = document.getElementById('staff-roll');
    const rollContent = document.getElementById('roll-content');
    const startScreen = document.getElementById('start-screen');
    const gameContainer = document.getElementById('game-container');

    const TILE_SIZE = 64; 
    const MAP_COLS = 10;
    const MAP_ROWS = 15;

    const mapData = [
        [2,2,2,2,2,2,2,2,2,2],
        [2,2,2,2,2,2,2,2,2,2],
        [2,2,2,2,2,2,2,2,2,2],
        [2,0,0,4,6,4,0,0,2,2],
        [2,0,5,4,4,4,5,0,2,2],
        [2,0,0,3,3,3,0,0,2,2],
        [2,0,0,1,1,1,0,0,2,2],
        [2,0,0,1,1,1,0,0,2,2],
        [2,0,0,1,1,1,0,0,2,2],
        [2,0,0,1,1,1,0,0,2,2],
        [2,0,0,1,1,1,0,0,2,2],
        [2,0,0,1,1,1,0,0,2,2],
        [2,0,0,1,1,1,0,0,2,2],
        [2,2,2,2,2,2,2,2,2,2],
        [2,2,2,2,2,2,2,2,2,2]
    ];

    const tiles = {};
    function createTiles() {
        const create = (drawFn) => {
            const c = document.createElement('canvas');
            c.width = TILE_SIZE; c.height = TILE_SIZE;
            drawFn(c.getContext('2d'));
            return c;
        };

        tiles[0] = create(cx => {
            cx.fillStyle = '#3a3a3a'; cx.fillRect(0, 0, TILE_SIZE, TILE_SIZE);
            cx.fillStyle = '#4a4a4a'; cx.fillRect(0, 0, TILE_SIZE, 2); cx.fillRect(0, 0, 2, TILE_SIZE);
            cx.fillStyle = '#222'; cx.fillRect(TILE_SIZE-2, 0, 2, TILE_SIZE); cx.fillRect(0, TILE_SIZE-2, TILE_SIZE, 2);
        });
        tiles[1] = create(cx => {
            const grad = cx.createLinearGradient(0, 0, TILE_SIZE, 0);
            grad.addColorStop(0, '#400'); grad.addColorStop(0.5, '#900'); grad.addColorStop(1, '#400');
            cx.fillStyle = grad; cx.fillRect(0, 0, TILE_SIZE, TILE_SIZE);
            cx.fillStyle = '#b08d00'; cx.fillRect(4, 0, 4, TILE_SIZE); cx.fillRect(TILE_SIZE-8, 0, 4, TILE_SIZE);
        });
        tiles[2] = create(cx => { cx.fillStyle = '#050505'; cx.fillRect(0, 0, TILE_SIZE, TILE_SIZE); });
        tiles[3] = create(cx => {
            const topGrad = cx.createLinearGradient(0, 0, 0, TILE_SIZE/2);
            topGrad.addColorStop(0, '#555'); topGrad.addColorStop(1, '#333');
            cx.fillStyle = topGrad; cx.fillRect(0, 0, TILE_SIZE, TILE_SIZE/2);
            const botGrad = cx.createLinearGradient(0, TILE_SIZE/2, 0, TILE_SIZE);
            botGrad.addColorStop(0, '#666'); botGrad.addColorStop(1, '#333');
            cx.fillStyle = botGrad; cx.fillRect(0, TILE_SIZE/2, TILE_SIZE, TILE_SIZE/2);
        });
        tiles[4] = create(cx => {
            cx.fillStyle = '#555'; cx.fillRect(0, 0, TILE_SIZE, TILE_SIZE);
            cx.fillStyle = '#666'; cx.fillRect(0, 0, TILE_SIZE, 4); cx.fillRect(0, 0, 4, TILE_SIZE);
            cx.fillStyle = '#333'; cx.fillRect(TILE_SIZE-4, 0, 4, TILE_SIZE); cx.fillRect(0, TILE_SIZE-4, TILE_SIZE, 4);
        });
        tiles[5] = create(cx => {
            const pGrad = cx.createLinearGradient(16, 0, 48, 0);
            pGrad.addColorStop(0, '#222'); pGrad.addColorStop(0.5, '#666'); pGrad.addColorStop(1, '#111');
            cx.fillStyle = pGrad; cx.fillRect(16, 16, 32, TILE_SIZE);
            cx.fillStyle = '#333'; cx.fillRect(12, 10, 40, 10);
        });
        tiles[6] = create(cx => {
            cx.fillStyle = '#555'; cx.fillRect(0, 0, TILE_SIZE, TILE_SIZE);
            const rGrad = cx.createRadialGradient(32, 32, 5, 32, 32, 25);
            rGrad.addColorStop(0, '#333'); rGrad.addColorStop(1, '#111');
            cx.fillStyle = rGrad; cx.beginPath(); cx.arc(32, 32, 25, 0, Math.PI*2); cx.fill();
        });
    }
    createTiles();

    function drawSlime(x, y, bounceOffset) {
        const sx = x + TILE_SIZE/2;
        const sy = y + TILE_SIZE/2 + bounceOffset;

        ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
        ctx.beginPath(); ctx.ellipse(sx, sy + 15, 25, 10, 0, 0, Math.PI*2); ctx.fill();

        const grad = ctx.createRadialGradient(sx - 10, sy - 15, 2, sx, sy, 35);
        grad.addColorStop(0, '#aaccff'); 
        grad.addColorStop(0.4, '#0055dd');
        grad.addColorStop(1, '#001155'); 
        
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.moveTo(sx, sy - 30);
        ctx.quadraticCurveTo(sx + 35, sy - 15, sx + 25, sy + 15);
        ctx.quadraticCurveTo(sx, sy + 25, sx - 25, sy + 15);
        ctx.quadraticCurveTo(sx - 35, sy - 15, sx, sy - 30);
        ctx.fill();

        ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
        ctx.beginPath(); ctx.ellipse(sx - 8, sy - 12, 10, 5, Math.PI / -6, 0, Math.PI*2); ctx.fill();

        ctx.fillStyle = '#000';
        ctx.beginPath(); ctx.arc(sx - 10, sy + 5, 4.5, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(sx + 10, sy + 5, 4.5, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.arc(sx - 11, sy + 3, 1.5, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(sx + 9, sy + 3, 1.5, 0, Math.PI*2); ctx.fill();
    }

    let player = {
        worldX: 4 * TILE_SIZE + TILE_SIZE/2, 
        worldY: 12 * TILE_SIZE,
        isMoving: false
    };

    let camera = { y: 0 };
    let frameCount = 0;
    const TARGET_Y = 4 * TILE_SIZE; 

    function update() {
        frameCount++;

        if (player.isMoving) {
            player.worldY -= 1.5;
            if (player.worldY <= TARGET_Y) {
                player.worldY = TARGET_Y;
                player.isMoving = false;
                setTimeout(startMonologue, 1000);
            }
        }

        camera.y = player.worldY - (480 / 2) + (TILE_SIZE / 2);
        camera.y = Math.max(0, Math.min(camera.y, MAP_ROWS * TILE_SIZE - 480));
    }

    function draw() {
        ctx.clearRect(0, 0, 640, 480);
        const startRow = Math.floor(camera.y / TILE_SIZE);
        const endRow = Math.min(MAP_ROWS - 1, startRow + Math.ceil(480 / TILE_SIZE) + 1);

        for (let r = startRow; r <= endRow; r++) {
            for (let c = 0; c < MAP_COLS; c++) {
                const tileId = mapData[r][c];
                const drawX = c * TILE_SIZE;
                const drawY = r * TILE_SIZE - camera.y;
                
                ctx.drawImage(tiles[tileId], drawX, drawY);

                if (tileId === 5) {
                    const fireFrame = Math.floor(frameCount / 8) % 3;
                    const fx = drawX + 32;
                    const fy = drawY + 8;

                    ctx.globalCompositeOperation = 'lighter';
                    const glow = ctx.createRadialGradient(fx, fy, 0, fx, fy, 40);
                    glow.addColorStop(0, 'rgba(255, 100, 0, 0.5)');
                    glow.addColorStop(1, 'rgba(255, 100, 0, 0)');
                    ctx.fillStyle = glow;
                    ctx.beginPath(); ctx.arc(fx, fy, 40, 0, Math.PI*2); ctx.fill();
                    ctx.globalCompositeOperation = 'source-over';

                    ctx.fillStyle = ['#ff4500', '#ff8c00', '#ffd700'][fireFrame];
                    ctx.beginPath(); ctx.arc(fx, fy + (fireFrame%2), 8, 0, Math.PI*2); ctx.fill();
                }
            }
        }

        const drawPx = player.worldX - TILE_SIZE/2;
        const drawPy = player.worldY - camera.y;
        let bounce = player.isMoving ? Math.sin(frameCount * 0.25) * 5 : 0;
        drawSlime(drawPx, drawPy, bounce);
    }

    function gameLoop() {
        update();
        draw();
        requestAnimationFrame(gameLoop);
    }

    // --- クリック待ちのロジック ---
    let waitingForInput = false;
    let inputResolve = null;

    // ゲーム画面のどこかをタップ/クリックした時の処理
    gameContainer.addEventListener('click', () => {
        if (waitingForInput && inputResolve) {
            inputResolve(); // 待機状態を解除して次へ進む
        }
    });

    const script = [
        "なんてことだ、、、\n奴らはもうヘニョリン玉を\n手に入れてしまったのか",
        "ここはペニョロンポッペを召喚しなければ",
        "ポニョロンポッペー！！",
        "終わった、、、すべて終わったんだ……"
    ];

    async function typeWriter(text) {
        msgText.innerHTML = "";
        
        // 1文字ずつ表示
        for (let char of text) {
            if (char === '\n') {
                msgText.innerHTML += '<br>';
            } else {
                msgText.innerHTML += char;
            }
            await new Promise(r => setTimeout(r, 60));
        }

        // 表示完了後、▼を点滅させてクリック待機
        msgCursor.style.display = 'block';
        waitingForInput = true;
        
        // ユーザーがクリックするまでここで処理を一時停止する
        await new Promise(resolve => { inputResolve = resolve; });
        
        // クリックされたら次へ
        waitingForInput = false;
        inputResolve = null;
        msgCursor.style.display = 'none';
    }

    async function startMonologue() {
        msgWindow.style.display = 'block';
        for (let line of script) {
            await typeWriter(line);
        }
        msgWindow.style.display = 'none';

        canvas.classList.add('sepia-mode');
        await new Promise(r => setTimeout(r, 2000));

        staffRoll.style.display = 'block';
        rollContent.classList.add('animate-roll');
    }

    startScreen.addEventListener('click', () => {
        startScreen.style.display = 'none';
        player.isMoving = true; 
    });

    gameLoop();

</script>

</body>
</html>
