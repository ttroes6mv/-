<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ポニョロンポッペの儀式 - 完結編</title>
<style>
    body {
        margin: 0;
        background: #000;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
        font-family: 'Hiragino Mincho ProN', 'MS PMincho', serif;
    }

    #game-container {
        position: relative;
        width: 100vw;
        max-width: 640px;
        aspect-ratio: 4/3;
        border: 4px solid #fff;
        box-shadow: 0 0 0 4px #000, 0 0 0 8px #555, 0 0 30px rgba(255,255,255,0.2);
        background: #000;
        box-sizing: border-box;
    }

    canvas {
        display: block;
        width: 100%;
        height: 100%;
        transition: filter 3s ease;
    }

    #explosion-flash {
        position: absolute;
        inset: 0;
        background: #fff;
        opacity: 0;
        z-index: 150;
        pointer-events: none;
    }

    #msg-window {
        display: none;
        position: absolute;
        bottom: 10px; 
        left: 50%;
        transform: translateX(-50%);
        width: 90%;
        max-width: 560px;
        height: 150px; 
        background: linear-gradient(to bottom, rgba(0, 0, 40, 0.95), rgba(0, 0, 10, 0.98));
        border: 4px double #d4af37;
        border-radius: 8px;
        color: #fff;
        padding: 15px 20px; 
        box-sizing: border-box;
        font-size: 20px; 
        line-height: 1.5; 
        z-index: 200;
        text-shadow: 2px 2px 2px #000;
        cursor: pointer;
    }

    #msg-cursor {
        display: none;
        position: absolute;
        bottom: 12px;
        right: 20px;
        font-size: 18px;
        color: #d4af37;
        animation: blink 1s infinite;
    }

    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

    .shake {
        animation: shakeEffect 0.5s ease-in-out;
    }
    @keyframes shakeEffect {
        0% { transform: translate(0,0); }
        10% { transform: translate(-10px, -10px); }
        30% { transform: translate(10px, 10px); }
        50% { transform: translate(-10px, 10px); }
        70% { transform: translate(10px, -10px); }
        100% { transform: translate(0,0); }
    }

    #staff-roll {
        display: none;
        position: absolute;
        inset: 0;
        background: rgba(40, 20, 10, 0.4);
        color: #fff;
        z-index: 300;
        text-align: center;
        overflow: hidden;
        backdrop-filter: sepia(1) brightness(0.6);
    }

    #roll-content {
        position: absolute;
        width: 100%;
        top: 100%;
        font-size: 22px;
    }

    .animate-roll { animation: scrollUp 20s linear forwards; } /* 少し長くしました */
    @keyframes scrollUp { to { top: -180%; } }

    #start-screen {
        position: absolute;
        inset: 0;
        background: #000;
        color: #fff;
        display: flex;
        justify-content: center;
        align-items: center;
        cursor: pointer;
        z-index: 500;
        font-size: 24px;
    }

    @media (max-width: 480px) {
        #msg-window { font-size: 16px; height: 130px; padding: 12px 15px; }
        #msg-cursor { bottom: 8px; right: 15px; font-size: 14px; }
    }
</style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas" width="640" height="480"></canvas>
    <div id="explosion-flash"></div>
    <div id="msg-window">
        <span id="msg-text"></span>
        <span id="msg-cursor">▼</span>
    </div>
    
    <div id="staff-roll">
        <div id="roll-content">
            <p style="margin-bottom: 80px; color: #d4af37; font-size: 1.2em;">- STAFF ROLL -</p>
            
            <p>Original Idea<br><strong>やわT</strong></p>
            <br><br>
            
            <p>Those Who Remembered<br><strong>前ちょ</strong></p>
            <br><br>
            
            <p>Producer<br><strong>トトローズ</strong></p>
            <br><br>
            
            <p>Special Thanks<br><strong>MORIKO<br>YUKIKO</strong></p>
            
            <br><br><br><br><br>
            <p style="letter-spacing: 15px; font-size: 32px; color: #d4af37;">FIN</p>
        </div>
    </div>

    <div id="start-screen">画面をタップして開始</div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const msgWindow = document.getElementById('msg-window');
    const msgText = document.getElementById('msg-text');
    const msgCursor = document.getElementById('msg-cursor');
    const staffRoll = document.getElementById('staff-roll');
    const rollContent = document.getElementById('roll-content');
    const startScreen = document.getElementById('start-screen');
    const gameContainer = document.getElementById('game-container');
    const flash = document.getElementById('explosion-flash');

    const TILE_SIZE = 64; 
    const MAP_COLS = 10;
    const MAP_ROWS = 15;

    const mapData = [
        [2,2,2,2,2,2,2,2,2,2], [2,2,2,2,2,2,2,2,2,2], [2,2,2,2,2,2,2,2,2,2],
        [2,0,0,4,6,4,0,0,2,2], [2,0,5,4,4,4,5,0,2,2], [2,0,0,3,3,3,0,0,2,2],
        [2,0,0,1,1,1,0,0,2,2], [2,0,0,1,1,1,0,0,2,2], [2,0,0,1,1,1,0,0,2,2],
        [2,0,0,1,1,1,0,0,2,2], [2,0,0,1,1,1,0,0,2,2], [2,0,0,1,1,1,0,0,2,2],
        [2,0,0,1,1,1,0,0,2,2], [2,2,2,2,2,2,2,2,2,2], [2,2,2,2,2,2,2,2,2,2]
    ];

    const tiles = {};
    function createTiles() {
        const create = (drawFn) => {
            const c = document.createElement('canvas');
            c.width = TILE_SIZE; c.height = TILE_SIZE;
            drawFn(c.getContext('2d'));
            return c;
        };
        tiles[0] = create(cx => { cx.fillStyle = '#3a3a3a'; cx.fillRect(0, 0, TILE_SIZE, TILE_SIZE); });
        tiles[1] = create(cx => {
            cx.fillStyle = '#900'; cx.fillRect(0, 0, TILE_SIZE, TILE_SIZE);
            cx.fillStyle = '#b08d00'; cx.fillRect(4, 0, 4, TILE_SIZE); cx.fillRect(TILE_SIZE-8, 0, 4, TILE_SIZE);
        });
        tiles[2] = create(cx => { cx.fillStyle = '#050505'; cx.fillRect(0, 0, TILE_SIZE, TILE_SIZE); });
        tiles[3] = create(cx => { cx.fillStyle = '#444'; cx.fillRect(0, 0, TILE_SIZE, TILE_SIZE); cx.fillStyle = '#222'; cx.fillRect(0, TILE_SIZE/2, TILE_SIZE, TILE_SIZE/2); });
        tiles[4] = create(cx => { cx.fillStyle = '#555'; cx.fillRect(0, 0, TILE_SIZE, TILE_SIZE); cx.strokeStyle = '#666'; cx.strokeRect(5, 5, TILE_SIZE-10, TILE_SIZE-10); });
        tiles[5] = create(cx => { cx.fillStyle = '#222'; cx.fillRect(16, 16, 32, TILE_SIZE); });
        tiles[6] = create(cx => { cx.fillStyle = '#555'; cx.fillRect(0, 0, TILE_SIZE, TILE_SIZE); cx.fillStyle = '#111'; cx.beginPath(); cx.arc(32, 32, 20, 0, Math.PI*2); cx.fill(); });
    }
    createTiles();

    function drawSlime(x, y, bounce) {
        const sx = x + TILE_SIZE/2; const sy = y + TILE_SIZE/2 + bounce;
        const grad = ctx.createRadialGradient(sx - 10, sy - 15, 2, sx, sy, 35);
        grad.addColorStop(0, '#aaccff'); grad.addColorStop(0.4, '#0055dd'); grad.addColorStop(1, '#001155');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.moveTo(sx, sy - 30);
        ctx.quadraticCurveTo(sx + 35, sy - 15, sx + 25, sy + 15);
        ctx.quadraticCurveTo(sx, sy + 25, sx - 25, sy + 15);
        ctx.quadraticCurveTo(sx - 35, sy - 15, sx, sy - 30);
        ctx.fill();
        ctx.fillStyle = '#000';
        ctx.beginPath(); ctx.arc(sx-10, sy+5, 4.5, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(sx+10, sy+5, 4.5, 0, Math.PI*2); ctx.fill();
    }

    let player = { worldY: 12 * TILE_SIZE, isMoving: false, isMovingDown: false };
    let frameCount = 0;

    function gameLoop() {
        frameCount++;
        if (player.isMoving) {
            player.worldY -= 1.5;
            if (player.worldY <= 4 * TILE_SIZE) {
                player.worldY = 4 * TILE_SIZE;
                player.isMoving = false;
                setTimeout(startMonologue, 1000);
            }
        } 
        else if (player.isMovingDown) {
            player.worldY += 1.0; 
            if (player.worldY >= 6 * TILE_SIZE) { 
                player.worldY = 6 * TILE_SIZE;
                player.isMovingDown = false;
            }
        }
        
        const targetCamY = player.worldY - (480 / 2) + (TILE_SIZE / 2) + 45;
        const camY = Math.max(0, Math.min(targetCamY, MAP_ROWS * TILE_SIZE - 480));
        
        ctx.clearRect(0, 0, 640, 480);
        for (let r = 0; r < MAP_ROWS; r++) {
            for (let c = 0; c < MAP_COLS; c++) {
                ctx.drawImage(tiles[mapData[r][c]], c * TILE_SIZE, r * TILE_SIZE - camY);
                if (mapData[r][c] === 5) {
                    const fx = c * TILE_SIZE + 32; const fy = r * TILE_SIZE - camY + 8;
                    ctx.fillStyle = `rgba(255, 100, 0, 0.3)`;
                    ctx.beginPath(); ctx.arc(fx, fy, 30, 0, Math.PI*2); ctx.fill();
                    ctx.fillStyle = '#ff8c00'; ctx.beginPath(); ctx.arc(fx, fy + (Math.floor(frameCount/10)%2), 8, 0, Math.PI*2); ctx.fill();
                }
            }
        }
        
        let bounce = (player.isMoving || player.isMovingDown) ? Math.sin(frameCount * 0.25) * 5 : 0;
        drawSlime(player.worldX - TILE_SIZE/2 || 320 - 32, player.worldY - camY, bounce);
        
        requestAnimationFrame(gameLoop);
    }

    let waitingForInput = false;
    let inputResolve = null;

    gameContainer.addEventListener('click', () => {
        if (waitingForInput && inputResolve) inputResolve();
    });

    const script = [
        "マサカキノタネ\nやつらはもうヘニョリンダマを\nてにいれていたのか！？",
        "だとしたら\nぼくにはかちめがない！\nもうおわりだモロ！",
        "いや、まだピロロントッペが\nのこっているはずだ",
        "ペロロントッペ〜！！",
        "explosion_trigger",
        "おわった･･･\nすべておわったんだ･･･",
        "なにもかも"
    ];

    async function typeWriter(text) {
        if (text === "explosion_trigger") {
            gameContainer.classList.add('shake');
            flash.style.opacity = 1;
            await new Promise(r => setTimeout(r, 100));
            flash.style.opacity = 0;
            await new Promise(r => setTimeout(r, 1000));
            gameContainer.classList.remove('shake');
            return;
        }

        msgText.innerHTML = "";
        for (let char of text) {
            msgText.innerHTML += char === '\n' ? '<br>' : char;
            await new Promise(r => setTimeout(r, 60));
        }
        msgCursor.style.display = 'block';
        waitingForInput = true;
        await new Promise(resolve => { inputResolve = resolve; });
        waitingForInput = false;
        inputResolve = null;
        msgCursor.style.display = 'none';
    }

    async function startMonologue() {
        msgWindow.style.display = 'block';
        for (let line of script) {
            await typeWriter(line);
        }
        msgWindow.style.display = 'none';

        player.isMovingDown = true;
        
        await new Promise(r => {
            const check = setInterval(() => {
                if (!player.isMovingDown) {
                    clearInterval(check);
                    r();
                }
            }, 50);
        });

        await new Promise(r => setTimeout(r, 800));

        canvas.classList.add('sepia-mode');
        await new Promise(r => setTimeout(r, 2000));

        staffRoll.style.display = 'block';
        rollContent.classList.add('animate-roll');
    }

    startScreen.addEventListener('click', () => {
        startScreen.style.display = 'none';
        player.isMoving = true; 
    });

    gameLoop();
</script>
</body>
</html>
